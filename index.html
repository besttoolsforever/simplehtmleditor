<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="editor-container">
            <div class="editor-buttons">
                <button id="toggle-view"><img src="assets/eye-fill.svg" alt="Preview" id="toggle-view-button">
                    Preview</button>
                <button id="toggle-theme"><img src="assets/moon-fill.svg" alt="Dark Mode"> Dark Mode</button>
                <button id="toggle-fullscreen"><img src="assets/aspect-ratio.svg" alt="Expand Screen"> Expand
                    Screen</button>
                <button id="toggle-browser-fullscreen"><img src="assets/arrows-fullscreen.svg" alt="Full Screen (F11)">
                    Full Screen (F11)</button>
                <button id="toggle-settings"><img src="assets/settings.svg" alt="Settings"> Settings</button>
            </div>
            <div class="editor-toolbar">
                <select id="font-family">
                    <option value="">Font</option>
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Verdana">Verdana</option>
                </select>
                <select id="font-size" class="form-control">
                    <option value="12px">12px</option>
                    <option value="14px">14px</option>
                    <option value="16px">16px</option>
                    <option value="18px">18px</option>
                    <option value="20px">20px</option>
                    <option value="24px">24px</option>
                    <option value="28px">28px</option>
                </select>
                <label for="font-color" class="label1"><img src="assets/palette-fill.svg" alt="Text Color"></label>
                <input type="color" id="font-color" class="btn btn-light" value="#000000"
                    onchange="changeFontColor(this.value)">
                <label for="bg-color" class="label2"><img src="assets/highlighter.svg" alt="Background Color"></label>
                <input type="color" id="bg-color" class="btn btn-light" value="#ffffff"
                    onchange="changeBackgroundColor(this.value)">
                <button onclick="formatText('bold')"><img src="assets/type-bold.svg" alt="Bold"></button>
                <button onclick="formatText('italic')"><img src="assets/type-italic.svg" alt="Italic"></button>
                <button onclick="formatText('underline')"><img src="assets/type-underline.svg" alt="Underline"></button>
                <button onclick="formatText('justifyLeft')"><img src="assets/text-left.svg" alt="Align Left"></button>
                <button onclick="formatText('justifyCenter')"><img src="assets/text-center.svg" alt="Center"></button>
                <button onclick="formatText('justifyRight')"><img src="assets/text-right.svg"
                        alt="Align Right"></button>
                <button onclick="formatText('justifyFull')"><img src="assets/justify.svg" alt="Justify"></button>
                <button onclick="formatText('insertOrderedList')"><img src="assets/list-ol.svg"
                        alt="Ordered List"></button>
                <button onclick="formatText('insertUnorderedList')"><img src="assets/list-ul.svg"
                        alt="Unordered List"></button>
                <button id="insert-image"><img src="assets/image.svg" alt="Insert Image"></button>
                <button id="create-link"><img src="assets/link.svg" alt="Link"></button>
                <button id="removeLink" class="btn btn-light" onclick="formatText('unlink')"><img
                        src="assets/unlink.svg" alt="Remove Link"></button>
                <button id="print"><img src="assets/printer.svg" alt="Print"></button>

            </div>
            <div id="editor" class="editor" contenteditable="true" data-placeholder="Type your text here...">
            </div>
            <div class="button-group">
                <button class="cta-button" id="copyCodeButton">
                    <span class="btn-text">Copy Code</span>
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20"
                        fill="currentColor">
                        <path
                            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
                    </svg>
                    <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20"
                        height="20" fill="currentColor" style="display: none;">
                        <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" />
                    </svg>
                </button>

                <button class="cta-button" id="copyContentButton">
                    <span class="btn-text">Copy Content</span>
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20"
                        fill="currentColor">
                        <path
                            d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
                    </svg>
                    <svg class="icon-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20"
                        height="20" fill="currentColor" style="display: none;">
                        <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Image Dialog -->
    <div id="image-dialog" class="hidden">
        <div class="dialog-content" style="min-width: 400px; max-width: 500px;">
            <h3 style="margin-top: 0;">Image Settings</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <div style="grid-column: span 2;">
                    <label for="image-url">Image URL:</label>
                    <input type="text" id="image-url" placeholder="Enter image URL" style="width: 100%;">
                </div>
                <div>
                    <label for="image-alt">Alt Text:</label>
                    <input type="text" id="image-alt" placeholder="Alt text" style="width: 100%;">
                </div>
                <div>
                    <label for="image-title">Title:</label>
                    <input type="text" id="image-title" placeholder="Tooltip title" style="width: 100%;">
                </div>
                <div>
                    <label for="image-width">Width:</label>
                    <input type="text" id="image-width" placeholder="e.g. 100px or 50%" style="width: 100%;">
                </div>
                <div>
                    <label for="image-height">Height:</label>
                    <input type="text" id="image-height" placeholder="e.g. 100px or auto" style="width: 100%;">
                </div>
                <div>
                    <label for="image-border-radius">Border Radius:</label>
                    <input type="text" id="image-border-radius" placeholder="e.g. 5px or 50%" style="width: 100%;">
                </div>
            </div>

            <!-- Spacing Section with Toggle -->
            <div style="margin-bottom: 10px;">
                <button type="button" class="toggle-spacing-btn" id="toggle-spacing-btn">
                    ▼ Show Spacing (Margin/Padding)
                </button>
            </div>

            <div class="spacing-content hidden" id="spacing-content">
                <div class="spacing-grid">
                    <label>Margin:</label>
                    <input type="text" id="image-margin-top" placeholder="Top">
                    <input type="text" id="image-margin-right" placeholder="Right">
                    <input type="text" id="image-margin-bottom" placeholder="Bottom">
                    <input type="text" id="image-margin-left" placeholder="Left">

                    <label>Padding:</label>
                    <input type="text" id="image-padding-top" placeholder="Top">
                    <input type="text" id="image-padding-right" placeholder="Right">
                    <input type="text" id="image-padding-bottom" placeholder="Bottom">
                    <input type="text" id="image-padding-left" placeholder="Left">
                </div>
            </div>

            <div style="margin-bottom: 10px;">
                <label for="image-custom-css">Custom CSS:</label>
                <input type="text" id="image-custom-css" placeholder="e.g. border: 2px solid red;" style="width: 100%;">
            </div>

            <h4 style="margin: 10px 0 5px;">Link Settings</h4>
            <div style="margin-bottom: 10px;">
                <label for="image-link-url">Link URL (Optional):</label>
                <input type="text" id="image-link-url" placeholder="Enter link URL" style="width: 100%;">
                <label style="display: inline-block; margin-top: 5px;">
                    <input type="checkbox" id="image-link-new-tab"> Open in new tab
                </label>
            </div>

            <div style="text-align: right; margin-top: 15px;">
                <button id="save-image">Save</button>
                <button id="cancel-image">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Link Dialog -->
    <div id="link-dialog" class="hidden">
        <div class="dialog-content">
            <label for="link-url">Link URL:</label>
            <input type="text" id="link-url" placeholder="Enter link URL">

            <label for="link-new-tab">
                <input type="checkbox" id="link-new-tab"> Open in new tab
            </label>
            <button id="save-link">Save</button>
            <button id="cancel-link">Cancel</button>
        </div>
    </div>
    <script src="js/code-view.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
