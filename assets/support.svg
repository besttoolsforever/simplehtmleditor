<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    
    <mask id="questionMask">
      <rect width="200" height="200" fill="white"/>
      <!-- Question mark cutout - larger -->
      <path d="M 75 65 Q 75 40 100 40 Q 125 40 125 65 Q 125 82 100 90 L 100 115" 
            stroke="black" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="100" cy="140" r="10" fill="black"/>
    </mask>
  </defs>
  
  <!-- Circle with question mark cutout - larger -->
  <circle cx="100" cy="100" r="90" fill="url(#blueGradient)" mask="url(#questionMask)"/>
</svg>